{% extends 'base.html' %}
{% block content %}

<div class="auth-bg d-flex justify-content-center align-items-center">

  <div class="auth-card">

    <!-- TITLE -->
    <h3 class="text-center text-white mb-1">Taskify</h3>
    <p class="text-center subtitle mb-3">Login to continue</p>

    <!-- FLASH -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger text-center py-1">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <!-- FORM -->
    <form method="POST">

      <input type="email" name="email"
             class="form-control input-dark mb-2"
             placeholder="Enter Email" required>

      <input type="password" name="password"
             class="form-control input-dark mb-2"
             placeholder="Enter Password" required>

      <button class="btn btn-primary w-100 mt-3 btn-glow">
        Login
      </button>

    </form>

    <!-- ADMIN -->
    <div class="admin-box text-center mt-2">
      <small>Admin: admin@gmail.com | admin123</small>
    </div>

    <!-- FOOTER -->
    <p class="text-center mt-3 small text-light">
      Don't have an account?
      <a href="/signup" class="text-primary">Signup</a>
    </p>

  </div>

</div>

<style>

/* BACKGROUND */
.auth-bg {
  height: 100vh;
  background: linear-gradient(135deg,#0b0b0b,#0d1b3d);
}

/* CARD */
.auth-card {
  width: 340px;
  padding: 25px;
  background: #070f1f;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(13,110,253,0.4);
}

/* SUBTITLE (FIXED WHITE) */
.subtitle {
  color: white;
  font-size: 14px;
}

/* INPUT */
.input-dark {
  background: #0d162a;
  border: 1px solid #2a3a5f;
  color: white;
  font-size: 14px;
  padding: 8px;
}

/* PLACEHOLDER */
.input-dark::placeholder {
  color: #ccc;
  opacity: 1;
}

/* INPUT FOCUS */
.input-dark:focus {
  background: #0d162a;
  border-color: #4f46e5;
  color: white;
  box-shadow: none;
}

/* BUTTON */
.btn-glow {
  background: linear-gradient(90deg,#4f46e5,#6366f1);
  border: none;
}

.btn-glow:hover {
  opacity: 0.9;
}

/* ADMIN BOX */
.admin-box {
  border: 1px solid #4f46e5;
  border-radius: 6px;
  padding: 6px;
  font-size: 12px;
  color: #4f46e5;
}

</style>

{% endblock %}
