{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-center align-items-center login-bg">

    <div class="col-md-4">

        <div class="card login-card p-3 border-0">

            <!-- TITLE -->
            <div class="text-center mb-2">
                <div class="icon">📋</div>
                <h3 class="text-white">Task Manager</h3>
                <h3 class="  text-white">Login</h3>
                <h4 class="text-white small">Welcome back!</h4>
                <p class="text-white small">Access your dashboard</p>
            </div>

            <!-- FLASH -->
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-danger text-center">
                  {{ messages[0] }}
                </div>
              {% endif %}
            {% endwith %}

            <!-- FORM -->
            <form method="POST">

                <div class="mb-2">
                    <input type="email" name="email" class="form-control input-dark" placeholder="Email" required>
                </div>

                <div class="mb-2">
                    <input type="password" name="password" class="form-control input-dark" placeholder="Password" required>
                </div>

                <button class="btn btn-primary w-100 btn-glow">Login</button>

            </form>

            <!-- ADMIN INFO -->
            <div class="admin-box text-center mt-2">
                <small><b>Admin Login:</b> admin@gmail.com | admin123</small>
            </div>

            <!-- FOOTER -->
            <div class="text-center mt-2 text-light">
                <small>
                    Don't have an account?
                    <a href="/signup" class="fw-semibold text-primary">Signup</a>
                </small>
            </div>

        </div>

    </div>

</div>

<style>

/* BACKGROUND */
.login-bg {
  height: 100vh;
  background: #000;
}

/* CARD */
.login-card {
  background: #0b0b0b;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(13, 110, 253, 0.4);
}

/* ICON */
.icon {
  font-size: 35px;
  color: #0d6efd;
}

/* INPUT */
.input-dark {
  background: #111;
  border: 1px solid #333;
  color: white;
}

.input-dark::placeholder {
  color: #aaa;
}

.input-dark:focus {
  background: #111;
  border-color: #0d6efd;
  color: white;
  box-shadow: none;
}

/* BUTTON */
.btn-glow {
  background: linear-gradient(90deg, #0d6efd, #0056ff);
  border: none;
}

.btn-glow:hover {
  opacity: 0.9;
}

/* ADMIN BOX */
.admin-box {
  border: 1px solid #0d6efd;
  border-radius: 6px;
  padding: 8px;
  color: #0d6efd;
  font-size: 13px;
}

</style>

{% endblock %}
