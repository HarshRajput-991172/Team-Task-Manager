<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Taskify</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ===== BACKGROUND ===== */
        .auth-page {
            background: #000 !important;
        }

        .dashboard-page {
            background: #f5f6fa;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 230px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: #ffffff;
            border-right: 1px solid #eee;
            padding: 20px;
            z-index: 2000;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            height: 60px;
            position: fixed;
            top: 0;
            left: 230px;
            right: 0;
            background: #ffffff;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        /* ===== MAIN ===== */
        .main {
            margin-left: 120px;
            margin-top: 20px;
            padding: 25px;
        }

        /* ===== NAV ===== */
        .nav-link {
            display: block;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 8px;
            color: #333;
            text-decoration: none;
        }

        .nav-link:hover {
            background: #f1f5ff;
        }

        .nav-link.active {
            background: #0d6efd;
            color: white;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            .sidebar {
                left: -230px;
            }

            .sidebar.show {
                left: 0;
            }

            .topbar {
                left: 0;
            }

            .main {
                margin-left: 0;
            }
        }

        /* ===== GLOBAL UI ===== */
        .card {
            border-radius: 12px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #0d6efd, #0056ff);
            border: none;
        }
    </style>

</head>

<body class="{% if request.path in ['/login','/signup'] %}auth-page{% else %}dashboard-page{% endif %}">

{% if current_user.is_authenticated and request.path not in ['/login','/signup'] %}

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">

    <h5 class="mb-4">🚀 Taskify</h5>

    <!-- ✅ FIXED DASHBOARD LINK -->
    {% if current_user.role == "admin" %}
      <a href="/admin" class="nav-link {% if request.path=='/admin' %}active{% endif %}">
        🏠 Dashboard
      </a>
    {% else %}
      <a href="/dashboard" class="nav-link {% if request.path=='/dashboard' %}active{% endif %}">
        🏠 Dashboard
      </a>
    {% endif %}

    <a href="/projects" class="nav-link {% if request.path=='/projects' %}active{% endif %}">
        📁 Projects
    </a>

    <a href="/team" class="nav-link {% if request.path=='/team' %}active{% endif %}">
        👥 Team
    </a>

    <!--<a href="/tasks" class="nav-link {% if request.path=='/tasks' %}active{% endif %}">
        📋 Tasks
    </a>-->

    <a href="/settings" class="nav-link {% if request.path=='/settings' %}active{% endif %}">
        ⚙ Settings
    </a>

    <hr>

    <a href="/logout" class="btn btn-danger w-100 mt-2">
        Logout
    </a>

</div>

<!-- ===== TOPBAR ===== -->
<div class="topbar">

    <button class="btn btn-outline-dark d-md-none" onclick="toggleSidebar()">
        ☰
    </button>

    <input class="form-control w-50" placeholder="Search...">

    <span class="fw-semibold">{{ current_user.name }}</span>

</div>

{% endif %}

<!-- ===== CONTENT ===== -->
<div class="{% if current_user.is_authenticated and request.path not in ['/login','/signup'] %}main{% endif %}">
    {% block content %}{% endblock %}
</div>

<!-- JS -->
<script>
function toggleSidebar() {
    document.querySelector(".sidebar").classList.toggle("show");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
