<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ===== BACKGROUND ===== */
        .auth-page {
            background: #000 !important;
        }

        .dashboard-page {
            background: #f5f6fa;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 230px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: #ffffff;
            border-right: 1px solid #ddd;
            padding: 15px;
            transition: 0.3s;
            z-index: 2000;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            height: 60px;
            position: fixed;
            top: 0;
            left: 230px;
            right: 0;
            background: #ffffff;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        /* ===== MAIN ===== */
        .main {
            margin-left: 120px;
            margin-top: 15px;
            padding: 25px;
        }

        /* ===== NAV ===== */
        .nav-link {
            display: block;
            padding: 8px 10px;
            margin-bottom: 5px;
            border-radius: 6px;
            color: #333;
            text-decoration: none;
        }

        .nav-link:hover {
            background: #f0f0f0;
        }

        .nav-link.active {
            background: #0d6efd;
            color: white;
            font-weight: 500;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {

            .sidebar {
                left: -230px;
            }

            .sidebar.show {
                left: 0;
            }

            .topbar {
                left: 0;
            }

            .main {
                margin-left: 0;
            }
        }

        /* ===== AUTH UI (LOGIN + SIGNUP) ===== */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            width: 360px;
            padding: 28px;
            border-radius: 14px;
            background: #0b0b0b;
            box-shadow: 0 0 30px rgba(13,110,253,0.4);
            color: #fff;
        }

        .input-dark {
            background: #111;
            border: 1px solid #333;
            color: white;
        }

        .input-dark::placeholder {
            color: #aaa;
        }

        .input-dark:focus {
            border-color: #0d6efd;
            background: #111;
            color: white;
            box-shadow: none;
        }

        .btn-glow {
            background: linear-gradient(90deg, #0d6efd, #0056ff);
            border: none;
        }

        .info-box {
            border: 1px solid #0d6efd;
            border-radius: 6px;
            padding: 8px;
            color: #0d6efd;
            font-size: 13px;
            text-align: center;
        }

        .auth-footer {
            text-align: center;
            font-size: 13px;
            margin-top: 10px;
        }

        .auth-footer a {
            color: #0d6efd;
            text-decoration: none;
        }
    </style>

</head>

<body class="{% if request.path in ['/login','/signup'] %}auth-page{% else %}dashboard-page{% endif %}">

    {% if current_user.is_authenticated and request.path not in ['/login','/signup'] %}

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">

        <h5 class="fw-bold mb-3">Task Manager</h5>

        <a href="/admin" class="nav-link {% if request.path=='/admin' %}active{% endif %}">
            Dashboard
        </a>

        <a href="/projects" class="nav-link {% if request.path=='/projects' %}active{% endif %}">
            Projects
        </a>

        <a href="/team" class="nav-link {% if request.path=='/team' %}active{% endif %}">
            Team
        </a>

        <hr>

        <a href="/logout" class="btn btn-danger w-100 mt-2">
            Logout
        </a>

    </div>

    <!-- ===== TOPBAR ===== -->
    <div class="topbar">

        <button class="btn btn-outline-dark d-md-none" onclick="toggleSidebar()">
            ☰
        </button>

        <input class="form-control w-50" placeholder="Search...">

        <span class="fw-semibold">{{ current_user.name }}</span>

    </div>

    {% endif %}

    <!-- ===== CONTENT ===== -->
    <div class="{% if current_user.is_authenticated and request.path not in ['/login','/signup'] %}main{% endif %}">
        {% block content %}{% endblock %}
    </div>

    <!-- ===== JS ===== -->
    <script>
        function toggleSidebar() {
            document.querySelector(".sidebar").classList.toggle("show");
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
