{% extends 'base.html' %}
{% block content %}

<div class="main">

  <!-- HEADER -->
  <div class="d-flex justify-content-between mb-4">
    <div>
      <h3>Team</h3>
      <p class="text-muted">Manage team members</p>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card p-3">

    {% if users %}
    <table class="table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
        </tr>
      </thead>

      <tbody>
        {% for user in users %}
        <tr>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.role }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
      <p class="text-muted">No members found</p>
    {% endif %}

  </div>

</div>

{% endblock %}
